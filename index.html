<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Google Fonts -->

    <link href="css/bootstrap.min.css" rel="stylesheet">

    <link href="css/pro_theme.css" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="images/logo.jpg"/>
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrapper {

            padding: 3rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);

        .login-logo-container {
            width: 100%;
            max-width: 240px;
            height: auto;
            margin: 0 auto 1.5rem;
            padding: 15px;

            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .login-logo {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.2));
        }

            from { opacity: 0; transform: translateY(30px); }

<body>
    
    <div class="login-wrapper">
        <div class="login-card glass-panel text-center">

            <h2 class="fw-bold mb-1 text-gradient">Bienvenido</h2>
            <p class="text-muted small mb-5">Acceso al Sistema Administrativo y Técnico</p>
            
            <form action="paginas/verificar.php" method="POST" class="text-start">
                <div class="mb-3">
                    <label for="usuario" class="form-label small fw-bold text-uppercase text-muted px-2" style="letter-spacing: 0.1em;">Usuario</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ingrese su usuario" required>
                </div>
                
                <div class="mb-5">
                    <label for="clave" class="form-label small fw-bold text-uppercase text-muted px-2" style="letter-spacing: 0.1em;">Contraseña</label>
                    <input type="password" class="form-control" id="clave" name="clave" placeholder="••••••••" required>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg shadow-lg">
                        Iniciar Sesión
                    </button>
                </div>
